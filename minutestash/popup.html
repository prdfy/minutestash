<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; font-size: 14px; }
    h2 { margin: 0 0 12px 0; font-size: 16px; }
    #status { margin: 12px 0; color: #666; font-size: 12px; }
    #extractBtn {
      width: 100%;
      padding: 10px;
      background-color: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin: 10px 0;
    }
    #extractBtn:hover { background-color: #106ebe; }
    #progressBar {
      width: 100%;
      height: 4px;
      background-color: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin: 12px 0;
      display: none;
    }
    #progressBar div {
      height: 100%;
      background-color: #0078d4;
      width: 0%;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <h2>minutestash</h2>
  <button id="extractBtn">Extract & Download</button>
  <div id="progressBar"><div></div></div>
  <div id="status">Ready to extract transcripts from Microsoft Teams meetings.</div>
  <script src="popup.js"></script>
</body>
</html>
