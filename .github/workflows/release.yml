name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync manifest version
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('minutestash/manifest.json', 'utf8'));
            manifest.version = '$TAG_VERSION';
            fs.writeFileSync('minutestash/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Install dependencies
        run: npm ci

      - name: Lint extension
        run: npm run lint

      - name: Build extension
        run: npm run build

      - name: Rename artifact
        run: |
          shopt -s nullglob
          files=(dist/minutestash-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No build artifact found in dist/."
            exit 1
          fi
          src="${files[0]}"
          target="dist/minutestash-${{ steps.version.outputs.VERSION }}.zip"
          if [ "$src" = "$target" ]; then
            echo "Artifact already named $target"
          else
            mv "$src" "$target"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: dist/minutestash-${{ steps.version.outputs.VERSION }}.zip
